    <main class="login-page">
        <div class="login-box">

            <h1> Zaloguj się</h1>

            <form class="login-form">
                <input type="text" name="name"  id="name" placeholder="Nazwa użytkownika"> 
                <input type="password" name="password" id="password" placeholder="Hasło">

            <div class="remember">
                <input type="checkbox" name="remember" id="remember">
                <label for="remember">Zapamiętaj mnie </label>
            </div>

                
                <button type="submit" class="login-btn-login">Zaloguj</button>
            </form>
            
                <p> Nie masz jeszcze konta? <a href="/pages/register.html">  Załóż konto</a></p>

            </div>
